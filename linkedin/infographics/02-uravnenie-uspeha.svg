<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#F8FAFC"/>
  <text x="600" y="70" text-anchor="middle" fill="#0B1F3A" font-family="Arial,sans-serif" font-size="36" font-weight="bold">Уравнение успешного ОВП</text>
  <text x="600" y="110" text-anchor="middle" fill="#64748B" font-family="Arial,sans-serif" font-size="20">Не «какой реагент купить», а «что именно лечим»</text>
  <rect x="60" y="170" width="320" height="360" rx="20" fill="#E8F4FC" stroke="#2E86AB" stroke-width="3"/>
  <circle cx="220" cy="230" r="42" fill="#2E86AB"/><text x="220" y="242" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="32" font-weight="bold">1</text>
  <text x="220" y="310" text-anchor="middle" fill="#0B1F3A" font-family="Arial,sans-serif" font-size="28" font-weight="bold">ДИАГНОСТИКА</text>
  <text x="90" y="360" fill="#334155" font-family="Arial,sans-serif" font-size="18">• PLT / температурный профиль</text>
  <text x="90" y="395" fill="#334155" font-family="Arial,sans-serif" font-size="18">• История дебитов нефти/воды</text>
  <text x="90" y="430" fill="#334155" font-family="Arial,sans-serif" font-size="18">• Tracers, cross-flow</text>
  <text x="90" y="465" fill="#334155" font-family="Arial,sans-serif" font-size="18">• Механизм: coning / channel</text>
  <text x="430" y="370" text-anchor="middle" fill="#0B1F3A" font-family="Arial,sans-serif" font-size="72" font-weight="bold">+</text>
  <rect x="460" y="170" width="320" height="360" rx="20" fill="#FFF8E7" stroke="#C8860A" stroke-width="3"/>
  <circle cx="620" cy="230" r="42" fill="#C8860A"/><text x="620" y="242" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="32" font-weight="bold">2</text>
  <text x="620" y="310" text-anchor="middle" fill="#0B1F3A" font-family="Arial,sans-serif" font-size="28" font-weight="bold">ХИМИЯ</text>
  <text x="490" y="360" fill="#334155" font-family="Arial,sans-serif" font-size="18">• RPM — фазовая селективность</text>
  <text x="490" y="395" fill="#334155" font-family="Arial,sans-serif" font-size="18">• Гели / PPG/RPPG</text>
  <text x="490" y="430" fill="#334155" font-family="Arial,sans-serif" font-size="18">• Рецептура под пласт</text>
  <text x="490" y="465" fill="#334155" font-family="Arial,sans-serif" font-size="18">• Core flood gate перед полем</text>
  <text x="830" y="370" text-anchor="middle" fill="#0B1F3A" font-family="Arial,sans-serif" font-size="72" font-weight="bold">=</text>
  <rect x="860" y="170" width="280" height="360" rx="20" fill="#E8F8EE" stroke="#16A34A" stroke-width="3"/>
  <circle cx="1000" cy="230" r="42" fill="#16A34A"/><text x="1000" y="248" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="bold">OK</text>
  <text x="1000" y="310" text-anchor="middle" fill="#0B1F3A" font-family="Arial,sans-serif" font-size="26" font-weight="bold">ЭФФЕКТ</text>
  <text x="890" y="370" fill="#334155" font-family="Arial,sans-serif" font-size="18">↓ обводнённость</text>
  <text x="890" y="410" fill="#334155" font-family="Arial,sans-serif" font-size="18">→ дебит нефти</text>
  <text x="890" y="450" fill="#334155" font-family="Arial,sans-serif" font-size="18">↓ OPEX подъёма</text>
  <rect x="120" y="570" width="960" height="70" rx="12" fill="#0B1F3A"/>
  <text x="600" y="615" text-anchor="middle" fill="#FFF" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Химия — половина уравнения. Диагностика — вторая.</text>
</svg>